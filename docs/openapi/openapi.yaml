openapi: 3.1.0
info:
  title: MLtravel API
  version: 1.0.0
  description: HTTP contract for MLtravel-Backend NestJS routes
servers:
  - url: http://localhost:3001
    description: Local dev
paths:
  /api/health:
    get:
      operationId: getHealth
      summary: API health check
      description: Returns minimal health payload when the API server is running.
      tags:
        - Health
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
          description: Health status indicator
